<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'none'; style-src ${webview.cspSource}; img-src ${webview.cspSource} https:; script-src 'nonce-${nonce}';">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link nonce="${nonce}" href="${stylesMainUri}" rel="stylesheet">
	<title>Visual DSA</title>
</head>

<body>
	<script nonce="${nonce}" src="${scriptUri}"></script>
	<script nonce="${nonce}" src="${visScriptUri}"></script>
	<div id="panel">
		<div id="left-frame">
			<div id="controls" class="controls">
				<div id="controls-container">
					<div id="control-buttons">
						<button id="back" onclick="this.blur();" title="Back">
							<img src="${backIconUri}" width="50px" height="50px">
						</button>
						<button id="cont" onclick="this.blur();" title="Continue">
							<img src="${contIconUri}" width="50px" height="50px">
						</button>
						<button id="next" onclick="this.blur();" title="Next">
							<img src="${nextIconUri}" width="50px" height="50px">
						</button>
						<button id="run" onclick="this.blur();" title="Auto Step">
							<img src="${runIconUri}" width="50px" height="50px">
						</button>
						<button id="pause" onclick="this.blur();" title="Pause">
							<img src="${pauseIconUri}" width="50px" height="50px">
						</button>
						<button id="refresh" onclick="this.blur();" title="Refresh">
							<img src="${refreshIconUri}" width="50px" height="50px">
						</button>
					</div>
				</div>
				<div id="delay-container">
					<label id="delay-label" for="delay">Delay(ms)</label>
					<input name="delay" id="delay" type="number">
				</div>
				<div id="physics-container">
					<label id="physics-label" for="physics">Physics</label>
					<input name="physics" id="physics" type="checkbox">
				</div>
				<div id="smooth-edges-container">
					<label id="smooth-edges-label" for="smooth-edges">Smooth Edges</label>
					<input name="smooth-edges" id="smooth-edges" type="checkbox">
				</div>
			</div>
			<div id="variables-container">
				<div id="variables-header-container">
					<div id="variables-header">Expressions</div>
					<div class="variables-header-add">
						<button id="add-variable" name="add-variable" class="dsa-button add-variable"
							title="Add Variable" onclick="this.blur();">
							+
						</button>
					</div>
				</div>
				<div id="vars-options" class="vars-options">
					<div class="var-options">
						<div class="var-option-variable">
							<input type="text" name="variable-input" class="var-select variable-input">
							<select name="variable" class="variable">
							</select>
						</div>
						<div class="var-option-remove">
							<button name="remove-variable" class="dsa-button remove-variable" title="Remove Variable"
								onclick="this.blur();">
								-
							</button>
						</div>
					</div>
				</div>
			</div>
			<div id="attributes-container">
				<div id="attributes-header">Attributes</div>
				<div id="object-name-container">
					<div id="object-name-label">Name: </div>
					<div id="object-name"></div>
				</div>
				<div id="object-type-container">
					<div id="object-type-label">Type: </div>
					<div id="object-type"></div>
				</div>
				<div class="var-options-container">
					<div class="var-option var-option-layout">
						<span class="attribute-label">Layout</span>
						<select id="layout" name="layout" class="var-select layout">
							<option value="graph">Graph</option>
							<option value="tree">Tree</option>
							<option value="linkedlist">Linked List</option>
							<option value="array">Array</option>
							<option value="array2D">Array2D</option>
							<option value="stack">Stack</option>
							<option value="queue">Queue</option>
							<option value="set">Set</option>
							<option value="map">Map</option>
							<option value="bars">Bars</option>
							<option value="plotpoints">Plot Points</option>
							<option value="plotlines">Plot Lines</option>
						</select>
					</div>
					<div class="var-option var-option-orientation">
						<span class="attribute-label">Orientation</span>
						<select id="orientation" name="orientation" class="var-select orientation">
							<option value="horizontal">Horizontal</option>
							<option value="vertical">Vertical</option>
						</select>
					</div>
					<div class="var-option var-option-nodes">
						<div id="nodes-header-container">
							<div id="nodes-header" class="attribute-label">Children Nodes</div>
							<div class="nodes-header-remove">
								<button id="remove-nodes" name="remove-nodes" class="dsa-button remove-nodes"
									title="Clear Nodes" onclick="this.blur();">
									x
								</button>
							</div>
						</div>
						<select id="nodes" name="nodes" class="var-select nodes" multiple>
						</select>
					</div>
					<div class="var-option var-option-edges">
						<div id="edges-header-container">
							<div id="edges-header" class="attribute-label">Children Edges</div>
							<div class="edges-header-remove">
								<button id="remove-edges" name="remove-edges" class="dsa-button remove-edges"
									title="Clear Edges" onclick="this.blur();">
									x
								</button>
							</div>
						</div>
						<select id="edges" name="edges" class="var-select edges" multiple>
						</select>
					</div>
					<div class="var-option var-option-properties">
						<div id="properties-header-container">
							<div id="properties-header" class="attribute-label">Properties</div>
							<div class="properties-header-remove">
								<button id="remove-properties" name="remove-properties"
									class="dsa-button remove-properties" title="Clear Properties"
									onclick="this.blur();">
									x
								</button>
							</div>
						</div>
						<select id="properties" name="properties" class="var-select properties" multiple>
						</select>
					</div>
					<div class="var-option var-option-markers-x">
						<div id="markers-x-header-container">
							<div id="markers-x-header" class="attribute-label">Markers x-axis</div>
						</div>
						<div class="var-option-markers-x">
							<div class="markers-x-select-container">
								<input type="text" id="markers-x-input" name="markers-x-input"
									class="var-select markers-x-input">
								<select id="markers-x-options" name="markers-x" class="markers-x">
								</select>
							</div>
							<div class="markers-x-remove">
								<button id="remove-markers-x" name="remove-markers-x" class="dsa-button remove-markers-x"
									title="Remove Markers x-axis" onclick="this.blur();">
									x
								</button>
							</div>
						</div>
					</div>
					<div class="var-option var-option-markers-y">
						<div id="markers-y-header-container">
							<div id="markers-y-header" class="attribute-label">Markers y-axis</div>
						</div>
						<div class="var-option-markers-y">
							<div class="markers-y-select-container">
								<input type="text" id="markers-y-input" name="markers-y-input"
									class="var-select markers-y-input">
								<select id="markers-y-options" name="markers-y" class="markers-y">
								</select>
							</div>
							<div class="markers-y-remove">
								<button id="remove-markers-y" name="remove-markers-y" class="dsa-button remove-markers-y"
									title="Remove Markers y-axis" onclick="this.blur();">
									x
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div id="right-frame">
			<div id="source-container">
				<div id="source"></div>
			</div>
			<div id="progress-container">
				<progress id="progress-bar" class="progress-bar-indeterminate"></progress>
			</div>
			<div id="graph"></div>
		</div>
	</div>
</body>

</html>
